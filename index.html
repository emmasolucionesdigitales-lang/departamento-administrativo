<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · Emma Soluciones Digitales</title>
  <link rel="icon" type="image/png" href="favicon.ico"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#7b3fc9"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Emma Admin"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1a;color:#e2eaf4;min-height:100vh;}
    .screen{max-width:960px;margin:0 auto;padding:20px 16px;}
    .header{background:#111c2e;border-bottom:1px solid rgba(255,255,255,0.08);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
    .header h1{font-size:16px;font-weight:600;color:#e2eaf4;}
    .header span{font-size:12px;color:#7a9ab8;}
    .btn{padding:8px 16px;border-radius:8px;border:0.5px solid rgba(255,255,255,0.13);cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s;background:#1a2b3c;color:#e2eaf4;}
    .btn:hover{background:#253647;}
    .btn-primary{background:#185FA5;color:#fff;border:none;}
    .btn-primary:hover{background:#1a6fc0;}
    .btn-danger{background:#2e0a0a;color:#f07070;border:0.5px solid #f07070;}
    .btn-success{background:#0a2e1f;color:#4dd9a0;border:0.5px solid #4dd9a0;}
    .btn-sm{padding:4px 10px;font-size:11px;}
    .btn-google{background:#fff;color:#333;border:1px solid #ddd;display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:15px;border-radius:10px;cursor:pointer;}
    .btn-google:hover{background:#f5f5f5;}
    .card{background:#111c2e;border:0.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px;margin-bottom:12px;}
    .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;display:inline-block;}
    .badge-green{background:#0a2e1f;color:#4dd9a0;}
    .badge-red{background:#2e0a0a;color:#f07070;}
    .badge-blue{background:#1e3a5f;color:#5daaff;}
    .badge-gray{background:#1a2b3c;color:#7a9ab8;}
    input,select{width:100%;padding:9px 12px;background:#1a2b3c;border:0.5px solid rgba(255,255,255,0.13);border-radius:8px;color:#e2eaf4;font-size:14px;outline:none;margin-bottom:10px;}
    input:focus,select:focus{border-color:#185FA5;}
    label{font-size:12px;color:#7a9ab8;margin-bottom:4px;display:block;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    .stat-card{background:#1a2b3c;border-radius:10px;padding:14px;text-align:center;}
    .stat-num{font-size:28px;font-weight:700;color:#5daaff;}
    .stat-label{font-size:12px;color:#7a9ab8;margin-top:4px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
    .modal{background:#111c2e;border-radius:14px;padding:24px;width:100%;max-width:420px;border:0.5px solid rgba(255,255,255,0.12);}
    .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:40px 20px;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:8px 12px;color:#7a9ab8;font-weight:500;font-size:11px;text-transform:uppercase;border-bottom:0.5px solid rgba(255,255,255,0.08);}
    td{padding:10px 12px;border-bottom:0.5px solid rgba(255,255,255,0.05);vertical-align:middle;}
    tr:hover td{background:rgba(255,255,255,0.02);}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
  </style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>
<div id="modal-container"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script>
const ADMIN_UID = "cuPGzTs8wGbWMVYRajqXY7B46hr1";
firebase.initializeApp({
  apiKey:"AIzaSyB8BB_xFyXCobGHoMj_dFOTA1n76FROfS4",
  authDomain:"emma-soluciones.firebaseapp.com",
  projectId:"emma-soluciones",
  storageBucket:"emma-soluciones.firebasestorage.app",
  messagingSenderId:"611618583352",
  appId:"1:611618583352:web:90f0f3a0248bc016c087cd"
});
const db = firebase.firestore();
const auth = firebase.auth();

let licencias = [];
let filtro = "";

function toast(msg, ok) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = (ok===false) ? "#c93030" : "#185FA5";
  t.style.opacity = "1";
  setTimeout(function(){ t.style.opacity = "0"; }, 3000);
}

auth.onAuthStateChanged(function(user) {
  if(!user) { renderLogin(""); return; }
  if(user.uid !== ADMIN_UID) { auth.signOut(); renderLogin("Acceso denegado."); return; }
  cargarLicencias();
});

function loginGoogle() {
  var email = document.getElementById('adminEmail') ? document.getElementById('adminEmail').value : '';
  var pass = document.getElementById('adminPass') ? document.getElementById('adminPass').value : '';
  if(!email||!pass){toast('Completá email y contraseña',false);return;}
  auth.signInWithEmailAndPassword(email, pass).catch(function(e){ toast('Email o contraseña incorrectos', false); });
}

function logout() { auth.signOut(); }

function renderLogin(err) {
  document.getElementById("app").innerHTML =
    '<div class="login-screen">' +
    '<div style="text-align:center"><div style="margin-bottom:12px"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" width="72" height="72"><line x1="12" y1="16" x2="34" y2="38" stroke="#7b3fc9" stroke-width="2" opacity="0.5"/><line x1="76" y1="16" x2="54" y2="38" stroke="#7b3fc9" stroke-width="2" opacity="0.5"/><line x1="12" y1="72" x2="34" y2="50" stroke="#9d65e0" stroke-width="2" opacity="0.5"/><line x1="76" y1="72" x2="54" y2="50" stroke="#9d65e0" stroke-width="2" opacity="0.5"/><circle cx="10" cy="14" r="8" fill="#c9a5f5"/><circle cx="78" cy="14" r="8" fill="#9d65e0"/><circle cx="10" cy="74" r="8" fill="#9d65e0"/><circle cx="78" cy="74" r="8" fill="#c9a5f5"/><circle cx="44" cy="44" r="22" fill="#7b3fc9"/><rect x="33" y="34" width="16" height="3" rx="1.5" fill="white"/><rect x="33" y="42.5" width="12" height="3" rx="1.5" fill="white"/><rect x="33" y="51" width="16" height="3" rx="1.5" fill="white"/></svg></div>' +
    '<h1 style="font-size:22px;font-weight:700;color:#e2eaf4;margin-bottom:4px">Panel de Administración</h1>' +
    '<p style="font-size:14px;color:#7a9ab8">Sistema de Reparto 2026</p></div>' +
    (err ? '<p style="color:#f07070;font-size:13px">'+err+'</p>' : '') +
    '<button class="btn-google" onclick="loginGoogle()">' +
    '<svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.31z"/></svg>' +
    '<input id="adminEmail" type="email" placeholder="Email de administrador" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:10px;box-sizing:border-box">' +
    '<input id="adminPass" type="password" placeholder="Contraseña" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:14px;box-sizing:border-box">' +
    '<button onclick="loginGoogle()" style="width:100%;background:#7b3fc9;color:white;border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer">Ingresar</button>' +
    '<p style="font-size:11px;color:#4a6a85;margin-top:10px">Solo el administrador tiene acceso</p></div>';
}

async function cargarLicencias() {
  try {
    var snap = await db.collection("licencias").get();
    licencias = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    renderPanel();
  } catch(e) { toast("Error: "+e.message, false); }
}

function estadoBadge(estado) {
  if(estado === "activo")   return '<span class="badge badge-blue">Disponible</span>';
  if(estado === "usado")    return '<span class="badge badge-green">En uso</span>';
  return '<span class="badge badge-red">Inactiva</span>';
}

function renderPanel() {
  var total   = licencias.length;
  var activos = licencias.filter(function(l){ return l.estado==="activo"||l.estado==="usado"; }).length;
  var inact   = licencias.filter(function(l){ return l.estado==="inactivo"; }).length;
  var filtrados = licencias.filter(function(l){
    if(!filtro) return true;
    return (l.id||"").toLowerCase().indexOf(filtro)>=0 ||
           (l.negocio||"").toLowerCase().indexOf(filtro)>=0 ||
           (l.email||"").toLowerCase().indexOf(filtro)>=0 ||
           (l.celular||"").indexOf(filtro)>=0;
  });

  var filas = filtrados.map(function(l){
    var acciones =
      '<button class="btn btn-sm" style="background:#1e3a5f;color:#5daaff;border:none;margin-right:3px" onclick="abrirEditar(\''+l.id+'\')">Editar</button>' +
      (l.estado==="inactivo"
        ? '<button class="btn btn-sm btn-success" style="margin-right:3px" onclick="cambiarEstado(\''+l.id+'\',\'activo\')">Activar</button>'
        : '<button class="btn btn-sm btn-danger" style="margin-right:3px" onclick="cambiarEstado(\''+l.id+'\',\'inactivo\')">Desactivar</button>'
      ) +
      '<button class="btn btn-sm" style="background:#2e2006;color:#f5b942;border:0.5px solid #f5b942" onclick="resetDispositivo(\''+l.id+'\')">Reset</button>';
    return '<tr>' +
      '<td><code style="color:#5daaff;font-size:12px">'+l.id+'</code></td>' +
      '<td style="font-weight:500">'+(l.negocio||'<span style="color:#4a6a85">—</span>')+'</td>' +
      '<td style="color:#7a9ab8;font-size:12px">'+(l.email||"—")+'</td>' +
      '<td style="color:#7a9ab8;font-size:12px">'+(l.celular||"—")+'</td>' +
      '<td>'+estadoBadge(l.estado)+'</td>' +
      '<td><code style="color:#f5b942">'+(l.pin||"—")+'</code></td>' +
      '<td>'+acciones+'</td>' +
      '</tr>';
  }).join("");

  document.getElementById("app").innerHTML =
    '<div class="header">' +
    '<div><div style="display:flex;align-items:center;gap:10px"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" width="40" height="40"><line x1="12" y1="16" x2="34" y2="38" stroke="#7b3fc9" stroke-width="2" opacity="0.5"/><line x1="76" y1="16" x2="54" y2="38" stroke="#7b3fc9" stroke-width="2" opacity="0.5"/><line x1="12" y1="72" x2="34" y2="50" stroke="#9d65e0" stroke-width="2" opacity="0.5"/><line x1="76" y1="72" x2="54" y2="50" stroke="#9d65e0" stroke-width="2" opacity="0.5"/><circle cx="10" cy="14" r="8" fill="#c9a5f5"/><circle cx="78" cy="14" r="8" fill="#9d65e0"/><circle cx="10" cy="74" r="8" fill="#9d65e0"/><circle cx="78" cy="74" r="8" fill="#c9a5f5"/><circle cx="44" cy="44" r="22" fill="#7b3fc9"/><rect x="33" y="34" width="16" height="3" rx="1.5" fill="white"/><rect x="33" y="42.5" width="12" height="3" rx="1.5" fill="white"/><rect x="33" y="51" width="16" height="3" rx="1.5" fill="white"/></svg><h1 style="margin:0">Panel de Administración</h1></div><span>Sistema de Reparto 2026</span></div>' +
    '<div style="display:flex;gap:8px">' +
    '<button class="btn btn-primary btn-sm" onclick="abrirNueva()">+ Nueva licencia</button>' +
    '<button class="btn btn-sm" onclick="cargarLicencias()" title="Actualizar">&#8635;</button>' +
    '<button class="btn btn-sm" onclick="logout()">Salir</button>' +
    '</div></div>' +
    '<div class="screen">' +
    '<div class="grid3" style="margin:16px 0">' +
    '<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">Total licencias</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:#4dd9a0">'+activos+'</div><div class="stat-label">Activas</div></div>' +
    '<div class="stat-card"><div class="stat-num" style="color:#f07070">'+inact+'</div><div class="stat-label">Inactivas</div></div>' +
    '</div>' +
    '<input placeholder="Buscar por código, negocio, email o celular..." style="margin-bottom:16px" oninput="filtro=this.value.toLowerCase();renderPanel()" value="'+filtro+'" />' +
    '<div class="card" style="padding:0;overflow:hidden">' +
    '<table><thead><tr>' +
    '<th>Código</th><th>Negocio</th><th>Email</th><th>Celular</th><th>Estado</th><th>PIN</th><th>Acciones</th>' +
    '</tr></thead><tbody>' +
    (filas || '<tr><td colspan="7" style="text-align:center;color:#4a6a85;padding:30px">Sin resultados</td></tr>') +
    '</tbody></table></div>' +
    '<p style="font-size:11px;color:#4a6a85;text-align:center;margin-top:12px">'+filtrados.length+' de '+total+' licencias</p>' +
    '</div>';
}

function abrirNueva() {
  var codigo = "SR2026-" + Math.random().toString(36).slice(2,6).toUpperCase();
  var pin = Math.floor(1000 + Math.random()*9000);
  document.getElementById("modal-container").innerHTML =
    '<div class="modal-overlay" onclick="cerrarModal(event)">' +
    '<div class="modal">' +
    '<h2 style="font-size:16px;font-weight:600;margin-bottom:16px">+ Nueva licencia</h2>' +
    '<label>Código de activación</label><input id="m-cod" value="'+codigo+'" />' +
    '<label>PIN de acceso</label><input id="m-pin" type="number" value="'+pin+'" />' +
    '<label>Notas (opcional)</label><input id="m-notas" placeholder="Ej: Cliente de prueba" />' +
    '<div style="display:flex;gap:8px;margin-top:4px">' +
    '<button class="btn btn-primary" style="flex:1" onclick="crearLicencia()">Crear</button>' +
    '<button class="btn" onclick="cerrarModalBtn()">Cancelar</button>' +
    '</div></div></div>';
}

async function crearLicencia() {
  var codigo = document.getElementById("m-cod").value.trim().toUpperCase();
  var pin = Number(document.getElementById("m-pin").value);
  var notas = document.getElementById("m-notas").value.trim();
  if(!codigo||!pin){ toast("Completá código y PIN", false); return; }
  try {
    await db.collection("licencias").doc(codigo).set({
      estado:"activo", pin:pin, plan:"individual", notas:notas,
      deviceId:"", email:"", celular:"", negocio:"",
      creadoEn: new Date().toISOString()
    });
    toast("✅ Licencia "+codigo+" creada — PIN: "+pin);
    cerrarModalBtn();
    cargarLicencias();
  } catch(e){ toast(e.message, false); }
}

function abrirEditar(id) {
  var l = licencias.find(function(x){ return x.id===id; });
  if(!l) return;
  document.getElementById("modal-container").innerHTML =
    '<div class="modal-overlay" onclick="cerrarModal(event)">' +
    '<div class="modal">' +
    '<h2 style="font-size:16px;font-weight:600;margin-bottom:4px">Editar licencia</h2>' +
    '<p style="font-size:12px;color:#5daaff;margin-bottom:16px">'+l.id+'</p>' +
    '<label>PIN</label><input id="e-pin" type="number" value="'+(l.pin||'')+'" />' +
    '<label>Negocio</label><input id="e-neg" value="'+(l.negocio||'')+'" />' +
    '<label>Email</label><input id="e-ema" value="'+(l.email||'')+'" />' +
    '<label>Celular</label><input id="e-cel" value="'+(l.celular||'')+'" />' +
    '<label>Notas</label><input id="e-not" value="'+(l.notas||'')+'" />' +
    '<div style="display:flex;gap:8px;margin-top:4px">' +
    '<button class="btn btn-primary" style="flex:1" onclick="guardarEdicion(\''+id+'\')">Guardar</button>' +
    '<button class="btn" onclick="cerrarModalBtn()">Cancelar</button>' +
    '</div></div></div>';
}

async function guardarEdicion(id) {
  var pin = Number(document.getElementById("e-pin").value);
  var neg = document.getElementById("e-neg").value.trim();
  var ema = document.getElementById("e-ema").value.trim();
  var cel = document.getElementById("e-cel").value.trim();
  var not = document.getElementById("e-not").value.trim();
  try {
    await db.collection("licencias").doc(id).update({pin:pin,negocio:neg,email:ema,celular:cel,notas:not});
    toast("✅ Licencia actualizada");
    cerrarModalBtn();
    cargarLicencias();
  } catch(e){ toast(e.message, false); }
}

async function cambiarEstado(id, estado) {
  var msg = estado==="inactivo" ? "¿Desactivar? El cliente perderá el acceso." : "¿Activar esta licencia?";
  if(!confirm(msg)) return;
  try {
    await db.collection("licencias").doc(id).update({estado:estado});
    toast(estado==="inactivo" ? "🔴 Desactivada" : "✅ Activada");
    cargarLicencias();
  } catch(e){ toast(e.message, false); }
}

async function resetDispositivo(id) {
  if(!confirm("¿Resetear dispositivo? El cliente podrá activar desde un celular nuevo.")) return;
  try {
    await db.collection("licencias").doc(id).update({deviceId:"", estado:"activo"});
    toast("✅ Dispositivo reseteado");
    cargarLicencias();
  } catch(e){ toast(e.message, false); }
}

function cerrarModal(e) { if(e.target.classList.contains("modal-overlay")) cerrarModalBtn(); }
function cerrarModalBtn() { document.getElementById("modal-container").innerHTML=""; }
</script>

<script>
if('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/departamento-administrativo/sw.js')
      .then(function(reg) { console.log('SW registrado:', reg.scope); })
      .catch(function(err) { console.log('SW error:', err); });
  });
}
</script>
</body>
</html>
