<!-- ══════════════════════════════════════════════════
     PATCH: pegá este bloque justo antes de </body>
     Fix 1: abrirEditarGestion muestra el PIN real
     Fix 2: guardarEdicionGestion guarda el PIN
══════════════════════════════════════════════════ -->
<script>
function abrirEditarGestion(id){
  var u=gestionUsuarios.find(function(x){return x.id===id;});if(!u)return;
  var esActivo=u.estado==="usado"||u.estado==="activo";
  document.getElementById("modal-container").innerHTML=
    '<div class="modal-overlay" onclick="cerrarModal(event)"><div class="modal"><div class="modal-drag"></div>'+
      '<h2 style="font-size:1.1rem;font-weight:700;margin-bottom:4px">\u270F\uFE0F Editar licencia</h2>'+
      '<p style="font-size:0.85rem;color:#c9a5f5;margin-bottom:14px;font-family:monospace;font-weight:700">'+id+'</p>'+
      (u.nombre||u.email?
        '<div style="background:#1a2b3c;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:0.82rem;color:#7a9ab8">'+
        '\uD83D\uDC64 Activado por: <b style="color:#e2eaf4">'+(u.nombre||"")+"</b>"+(u.email?" \xB7 "+u.email:"")+
        "</div>"
        :"<div style='background:#2d1a4a;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:0.82rem;color:#c9a5f5'>\uD83D\uDD11 Sin activar todav\xEDa</div>")+
      "<label>PIN de acceso</label>"+
      "<input id='gnv-pin' type='number' value='"+(u.pin||"")+"'/>"+
      "<label>Negocio / Cliente</label>"+
      "<input id='ge-neg' value='"+(u.negocio||"")+"'/>"+
      camposDueno(u)+
      "<label>Plan</label>"+
      "<select id='ge-plan'>"+
        "<option value='demo'"+(u.plan==="demo"?" selected":"")+">Demo</option>"+
        "<option value='basic'"+(u.plan==="basic"?" selected":"")+">Basic</option>"+
        "<option value='pro'"+(u.plan==="pro"?" selected":"")+">Pro</option>"+
      "</select>"+
      "<label>Fecha de vencimiento</label>"+
      "<input id='ge-venc' type='date' value='"+(u.vencimiento||"")+"'/>"+
      "<label>Estado</label>"+
      "<select id='ge-est'>"+
        "<option value='disponible'"+(u.estado==="disponible"?" selected":"")+">&#x1F511; Disponible (sin activar)</option>"+
        "<option value='usado'"+(esActivo?" selected":"")+">&#x2705; Activo</option>"+
        "<option value='inactivo'"+(u.estado==="inactivo"?" selected":"")+">&#x1F534; Suspendido</option>"+
      "</select>"+
      "<label>Notas</label>"+
      "<input id='ge-not' value='"+(u.notas||"")+"'/>"+
      camposCobro(u)+
      "<div style='display:flex;gap:10px;margin-top:12px'>"+
        "<button class='btn btn-purple' style='flex:1' onclick='guardarEdicionGestion(\""+id+"\")'>Guardar</button>"+
        "<button class='btn' onclick='cerrarModalBtn()'>Cancelar</button>"+
      "</div></div></div>";
}

async function guardarEdicionGestion(id){
  var cobro=getCobroData(); var dueno=getDuenoData();
  try{
    await dbControl.collection("licencias").doc(id).update(Object.assign({
      pin: Number(document.getElementById("gnv-pin").value)||0,
      negocio: document.getElementById("ge-neg").value.trim(),
      plan: document.getElementById("ge-plan").value,
      vencimiento: document.getElementById("ge-venc").value||null,
      estado: document.getElementById("ge-est").value,
      notas: document.getElementById("ge-not").value.trim()
    }, dueno, cobro));
    toast("\u2705 Licencia actualizada"); cerrarModalBtn(); cargarTodo();
  }catch(e){ toast(e.message,false); }
}
</script>
