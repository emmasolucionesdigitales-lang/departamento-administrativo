<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Admin Emma"/>
  <title>Admin · Emma Soluciones</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1a;color:#e2eaf4;min-height:100vh;}
  .header{background:#111c2e;border-bottom:1px solid rgba(255,255,255,0.08);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .header h1{font-size:16px;font-weight:600;color:#e2eaf4;display:flex;align-items:center;gap:10px;}
  .header-logo{width:32px;height:32px;border-radius:8px;}
  .btn{border:none;cursor:pointer;border-radius:8px;font-size:13px;font-weight:600;padding:8px 14px;transition:opacity .2s;}
  .btn:hover{opacity:.85;}
  .btn-purple{background:#7c3aed;color:#fff;}
  .btn-red{background:#dc2626;color:#fff;}
  .btn-gray{background:#1e2d42;color:#94a3b8;}
  .btn-green{background:#16a34a;color:#fff;}
  .btn-yellow{background:#d97706;color:#fff;}

  /* TABS */
  .tabs{display:flex;gap:0;background:#0d1525;border-bottom:1px solid rgba(255,255,255,0.08);overflow-x:auto;}
  .tab{padding:14px 20px;font-size:13px;font-weight:600;color:#64748b;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
  .tab.active{color:#a78bfa;border-bottom-color:#7c3aed;}
  .tab:hover:not(.active){color:#94a3b8;}

  /* SCREEN */
  .screen{max-width:960px;margin:0 auto;padding:16px;}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
  .stat{background:#111c2e;border-radius:12px;padding:16px;text-align:center;}
  .stat-num{font-size:28px;font-weight:800;color:#7c3aed;}
  .stat-lbl{font-size:12px;color:#64748b;margin-top:4px;}

  /* SEARCH & ACTIONS */
  .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .search{flex:1;min-width:180px;background:#111c2e;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;color:#e2eaf4;font-size:14px;outline:none;}
  .search::placeholder{color:#4a5568;}

  /* TABLE */
  .table-wrap{overflow-x:auto;border-radius:12px;border:1px solid rgba(255,255,255,0.06);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{background:#0d1525;color:#64748b;font-weight:600;padding:10px 14px;text-align:left;white-space:nowrap;}
  td{padding:10px 14px;border-top:1px solid rgba(255,255,255,0.05);vertical-align:middle;}
  tr:hover td{background:rgba(124,58,237,0.05);}
  .cod{font-family:monospace;font-weight:700;color:#a78bfa;font-size:14px;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge-blue{background:rgba(59,130,246,.15);color:#60a5fa;}
  .badge-green{background:rgba(22,163,74,.15);color:#4ade80;}
  .badge-red{background:rgba(220,38,38,.15);color:#f87171;}
  .actions{display:flex;gap:6px;flex-wrap:wrap;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
  .modal{background:#111c2e;border-radius:16px;padding:24px;width:100%;max-width:420px;border:1px solid rgba(255,255,255,0.08);}
  .modal h2{font-size:16px;font-weight:700;margin-bottom:18px;color:#e2eaf4;}
  .form-group{margin-bottom:14px;}
  .form-label{font-size:12px;color:#64748b;font-weight:600;margin-bottom:6px;display:block;}
  .form-input{width:100%;background:#0d1525;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#e2eaf4;font-size:14px;outline:none;}
  .form-input:focus{border-color:#7c3aed;}
  .modal-btns{display:flex;gap:10px;margin-top:20px;}

  /* TOAST */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2eaf4;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;pointer-events:none;}
  .toast.show{opacity:1;}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{background:#111c2e;border-radius:20px;padding:36px;width:100%;max-width:380px;text-align:center;border:1px solid rgba(255,255,255,0.08);}
  .login-card h1{font-size:20px;font-weight:700;margin:16px 0 6px;}
  .login-card p{font-size:13px;color:#64748b;margin-bottom:24px;}
  .login-logo{width:64px;height:64px;border-radius:16px;margin:0 auto;}

  @media(max-width:600px){
    .stats{grid-template-columns:repeat(3,1fr);}
    .stat-num{font-size:22px;}
    th,td{padding:8px 10px;}
    .btn{padding:6px 10px;font-size:12px;}
  }
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>
<div id="modal-container"></div>

<script>
const ADMIN_UID = "cuPGzTs8wGbWMVYRajqXY7B46hr1";

firebase.initializeApp({
  apiKey: "AIzaSyB8BB_xFyXCobGHoMj_dFOTA1n76FROfS4",
  authDomain: "emma-soluciones.firebaseapp.com",
  projectId: "emma-soluciones",
  storageBucket: "emma-soluciones.firebasestorage.app",
  messagingSenderId: "611618583352",
  appId: "1:611618583352:web:90f0f3a0248bc016c087cd"
});

const db = firebase.firestore();
const auth = firebase.auth();

// State
let licencias = [];
let filtro = "";
let appActiva = "reparto"; // reparto | multi | control

// App config
const APPS = {
  reparto: {
    label: "🚚 Reparto Individual",
    collection: "licencias",
    prefix: "SR",
    url: "emmasolucionesdigitales-lang.github.io/sistema-de-reparto-2026"
  },
  multi: {
    label: "👥 Reparto Multi",
    collection: "licencias_multi",
    prefix: "SM",
    url: "emmasolucionesdigitales-lang.github.io/sistema-de-reparto-multiple"
  },
  control: {
    label: "💼 Emma Control",
    collection: "licencias_control",
    prefix: "EC",
    url: "emmasolucionesdigitales-lang.github.io/emma-control"
  }
};

// Toast
function toast(msg, ok) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderLeft = "4px solid " + (ok===false ? "#dc2626" : "#16a34a");
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 3000);
}

// Auth
auth.onAuthStateChanged(function(user) {
  if (!user) { renderLogin(""); return; }
  if (user.uid !== ADMIN_UID) { auth.signOut(); renderLogin("Acceso denegado."); return; }
  cargarLicencias();
});

function loginAdmin() {
  var email = document.getElementById("adminEmail").value.trim();
  var pass = document.getElementById("adminPass").value;
  if (!email || !pass) { toast("Completá email y contraseña", false); return; }
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(e) { toast("Email o contraseña incorrectos", false); });
}

function logout() { auth.signOut(); }

function renderLogin(err) {
  document.getElementById("app").innerHTML =
    '<div class="login-wrap">' +
    '<div class="login-card">' +
    '<div style="width:64px;height:64px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:28px;">⚙️</div>' +
    '<h1>Panel de Administración</h1>' +
    '<p>Emma Soluciones Digitales</p>' +
    (err ? '<p style="color:#f87171;font-size:13px;margin-bottom:12px">'+err+'</p>' : '') +
    '<input id="adminEmail" type="email" class="form-input" placeholder="Email" style="margin-bottom:10px">' +
    '<input id="adminPass" type="password" class="form-input" placeholder="Contraseña" style="margin-bottom:16px" onkeydown="if(event.key===\'Enter\')loginAdmin()">' +
    '<button class="btn btn-purple" style="width:100%;padding:12px" onclick="loginAdmin()">Ingresar</button>' +
    '<p style="font-size:11px;color:#4a5568;margin-top:12px">Solo el administrador tiene acceso</p>' +
    '</div></div>';
}

// Load licenses for active app
async function cargarLicencias() {
  try {
    var col = APPS[appActiva].collection;
    var snap = await db.collection(col).get();
    licencias = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    renderPanel();
  } catch(e) { toast("Error: " + e.message, false); }
}

function estadoBadge(estado) {
  if (estado === "activo")  return '<span class="badge badge-blue">Disponible</span>';
  if (estado === "usado")   return '<span class="badge badge-green">En uso</span>';
  return '<span class="badge badge-red">Inactiva</span>';
}

function renderPanel() {
  var total   = licencias.length;
  var activos = licencias.filter(function(l){ return l.estado==="activo"||l.estado==="usado"; }).length;
  var inact   = licencias.filter(function(l){ return l.estado==="inactivo"; }).length;

  var filtradas = licencias.filter(function(l) {
    if (!filtro) return true;
    var q = filtro.toLowerCase();
    return (l.id||"").toLowerCase().includes(q) ||
           (l.negocio||"").toLowerCase().includes(q) ||
           (l.email||"").toLowerCase().includes(q) ||
           (l.celular||"").toLowerCase().includes(q);
  });

  // Build tabs HTML
  var tabsHTML = Object.keys(APPS).map(function(key) {
    return '<div class="tab' + (appActiva===key?' active':'') + '" onclick="cambiarApp(\''+key+'\')">' + APPS[key].label + '</div>';
  }).join('');

  // Build rows
  var rows = filtradas.map(function(l) {
    return '<tr>' +
      '<td><span class="cod">' + l.id + '</span></td>' +
      '<td>' + (l.negocio||'-') + '</td>' +
      '<td style="font-size:12px">' + (l.email||'-') + '</td>' +
      '<td>' + (l.celular||'-') + '</td>' +
      '<td>' + estadoBadge(l.estado) + '</td>' +
      '<td><code style="background:#0d1525;padding:2px 6px;border-radius:4px">' + (l.pin||'-') + '</code></td>' +
      '<td><div class="actions">' +
        '<button class="btn btn-gray" onclick="abrirEditar(\'' + l.id + '\')">Editar</button>' +
        (l.estado!=="inactivo"
          ? '<button class="btn btn-red" onclick="cambiarEstado(\'' + l.id + '\',\'inactivo\')">Desactivar</button>'
          : '<button class="btn btn-green" onclick="cambiarEstado(\'' + l.id + '\',\'activo\')">Activar</button>') +
        '<button class="btn btn-yellow" onclick="resetDispositivo(\'' + l.id + '\')">Reset</button>' +
      '</div></td>' +
    '</tr>';
  }).join('');

  document.getElementById("app").innerHTML =
    '<div class="header">' +
      '<h1><div style="width:32px;height:32px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px">⚙️</div> Panel Admin · Emma</h1>' +
      '<button class="btn btn-gray" onclick="logout()">Salir</button>' +
    '</div>' +
    '<div class="tabs">' + tabsHTML + '</div>' +
    '<div class="screen">' +
      '<div class="stats">' +
        '<div class="stat"><div class="stat-num">' + total + '</div><div class="stat-lbl">Total licencias</div></div>' +
        '<div class="stat"><div class="stat-num" style="color:#4ade80">' + activos + '</div><div class="stat-lbl">Activas</div></div>' +
        '<div class="stat"><div class="stat-num" style="color:#f87171">' + inact + '</div><div class="stat-lbl">Inactivas</div></div>' +
      '</div>' +
      '<div class="toolbar">' +
        '<input class="search" placeholder="Buscar por código, negocio, email o celular..." oninput="filtrar(this.value)" value="' + filtro + '">' +
        '<button class="btn btn-purple" onclick="abrirNueva()">+ Nueva licencia</button>' +
        '<button class="btn btn-gray" onclick="cargarLicencias()">↺</button>' +
      '</div>' +
      (filtradas.length === 0
        ? '<div style="text-align:center;padding:40px;color:#4a5568">No hay licencias para mostrar</div>'
        : '<div class="table-wrap"><table>' +
            '<thead><tr><th>Código</th><th>Negocio</th><th>Email</th><th>Celular</th><th>Estado</th><th>PIN</th><th>Acciones</th></tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table></div>') +
      '<p style="font-size:12px;color:#4a5568;margin-top:12px;text-align:center">' + filtradas.length + ' de ' + total + ' licencias · ' + APPS[appActiva].label + '</p>' +
    '</div>';
}

function filtrar(val) {
  filtro = val;
  renderPanel();
}

function cambiarApp(key) {
  appActiva = key;
  filtro = "";
  cargarLicencias();
}

function abrirNueva() {
  var prefix = APPS[appActiva].prefix;
  var codigo = prefix + Math.random().toString(36).slice(2,6).toUpperCase();
  var pin = Math.floor(1000 + Math.random() * 9000);
  document.getElementById("modal-container").innerHTML =
    '<div class="modal-overlay" onclick="cerrarModal(event)">' +
    '<div class="modal">' +
    '<h2>+ Nueva licencia · ' + APPS[appActiva].label + '</h2>' +
    '<div class="form-group"><label class="form-label">Código de activación</label>' +
    '<input class="form-input" id="m-cod" value="' + codigo + '"></div>' +
    '<div class="form-group"><label class="form-label">PIN de acceso</label>' +
    '<input class="form-input" id="m-pin" type="number" value="' + pin + '"></div>' +
    '<div class="form-group"><label class="form-label">Notas (opcional)</label>' +
    '<input class="form-input" id="m-notas" placeholder="Ej: cliente de prueba"></div>' +
    '<div class="modal-btns">' +
    '<button class="btn btn-purple" style="flex:1" onclick="crearLicencia()">Crear licencia</button>' +
    '<button class="btn btn-gray" onclick="cerrarModalBtn()">Cancelar</button>' +
    '</div></div></div>';
}

async function crearLicencia() {
  var codigo = document.getElementById("m-cod").value.trim().toUpperCase();
  var pin = Number(document.getElementById("m-pin").value);
  var notas = document.getElementById("m-notas").value.trim();
  if (!codigo || !pin) { toast("Completá código y PIN", false); return; }
  try {
    var col = APPS[appActiva].collection;
    await db.collection(col).doc(codigo).set({
      estado: "activo", pin: pin, notas: notas,
      deviceId: "", email: "", celular: "", negocio: "",
      creadoEn: new Date().toISOString(),
      app: appActiva
    });
    cerrarModalBtn();
    toast("✅ Licencia " + codigo + " creada", true);
    cargarLicencias();
  } catch(e) { toast("Error: " + e.message, false); }
}

function abrirEditar(id) {
  var l = licencias.find(function(x){ return x.id===id; });
  if (!l) return;
  document.getElementById("modal-container").innerHTML =
    '<div class="modal-overlay" onclick="cerrarModal(event)">' +
    '<div class="modal">' +
    '<h2>Editar licencia · ' + id + '</h2>' +
    '<div class="form-group"><label class="form-label">PIN</label>' +
    '<input class="form-input" id="e-pin" type="number" value="' + (l.pin||"") + '"></div>' +
    '<div class="form-group"><label class="form-label">Negocio</label>' +
    '<input class="form-input" id="e-neg" value="' + (l.negocio||"") + '"></div>' +
    '<div class="form-group"><label class="form-label">Email</label>' +
    '<input class="form-input" id="e-email" value="' + (l.email||"") + '"></div>' +
    '<div class="form-group"><label class="form-label">Celular</label>' +
    '<input class="form-input" id="e-cel" value="' + (l.celular||"") + '"></div>' +
    '<div class="form-group"><label class="form-label">Notas</label>' +
    '<input class="form-input" id="e-notas" value="' + (l.notas||"") + '"></div>' +
    '<div class="modal-btns">' +
    '<button class="btn btn-purple" style="flex:1" onclick="guardarEdicion(\'' + id + '\')">Guardar</button>' +
    '<button class="btn btn-gray" onclick="cerrarModalBtn()">Cancelar</button>' +
    '</div></div></div>';
}

async function guardarEdicion(id) {
  var pin = Number(document.getElementById("e-pin").value);
  var neg = document.getElementById("e-neg").value.trim();
  var email = document.getElementById("e-email").value.trim();
  var cel = document.getElementById("e-cel").value.trim();
  var notas = document.getElementById("e-notas").value.trim();
  try {
    var col = APPS[appActiva].collection;
    await db.collection(col).doc(id).update({ pin:pin, negocio:neg, email:email, celular:cel, notas:notas });
    cerrarModalBtn();
    toast("✅ Licencia actualizada", true);
    cargarLicencias();
  } catch(e) { toast("Error: " + e.message, false); }
}

async function cambiarEstado(id, estado) {
  try {
    var col = APPS[appActiva].collection;
    await db.collection(col).doc(id).update({ estado: estado });
    toast("✅ Estado actualizado", true);
    cargarLicencias();
  } catch(e) { toast("Error: " + e.message, false); }
}

async function resetDispositivo(id) {
  try {
    var col = APPS[appActiva].collection;
    await db.collection(col).doc(id).update({ deviceId: "", estado: "activo" });
    toast("✅ Dispositivo reseteado — el cliente puede activar en otro celular", true);
    cargarLicencias();
  } catch(e) { toast("Error: " + e.message, false); }
}

function cerrarModal(e) {
  if (e.target.classList.contains("modal-overlay")) cerrarModalBtn();
}
function cerrarModalBtn() {
  document.getElementById("modal-container").innerHTML = "";
}
</script>
</body>
</html>
