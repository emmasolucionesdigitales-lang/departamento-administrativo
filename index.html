<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{font-size:14px;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0f1a;color:#e2eaf4;min-height:100vh;font-size:1rem;}
    .screen{max-width:960px;margin:0 auto;padding:16px;}
    .header{background:#111c2e;border-bottom:1px solid rgba(255,255,255,0.08);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;gap:8px;}
    .header-title{display:flex;align-items:center;gap:10px;min-width:0;}
    .header-title h1{font-size:1rem;font-weight:600;color:#e2eaf4;white-space:nowrap;}
    .header-title span{font-size:0.8rem;color:#7a9ab8;display:none;}
    .header-actions{display:flex;gap:6px;flex-shrink:0;}
    .product-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);background:#111c2e;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .product-tabs::-webkit-scrollbar{display:none;}
    .ptab{padding:12px 16px;font-size:0.85rem;font-weight:600;color:#7a9ab8;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;transition:color .15s;-webkit-tap-highlight-color:transparent;}
    .ptab:hover{color:#e2eaf4;}
    .ptab.activo{color:#fff;border-bottom-color:#7b3fc9;}
    .ptab .ptab-badge{background:#7b3fc9;color:#fff;font-size:0.65rem;padding:2px 6px;border-radius:99px;}
    .btn{padding:10px 16px;border-radius:10px;border:0.5px solid rgba(255,255,255,0.13);cursor:pointer;font-size:0.9rem;font-weight:500;transition:all 0.15s;background:#1a2b3c;color:#e2eaf4;min-height:40px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
    .btn:active{opacity:0.75;transform:scale(0.97);}
    .btn-primary{background:#185FA5;color:#fff;border:none;}
    .btn-purple{background:#7b3fc9;color:#fff;border:none;}
    .btn-green{background:#0a5c2e;color:#4dd9a0;border:0.5px solid #4dd9a0;}
    .btn-orange{background:#5c2e0a;color:#f5a442;border:0.5px solid #f5a442;}
    .btn-danger{background:#2e0a0a;color:#f07070;border:0.5px solid #f07070;}
    .btn-success{background:#0a2e1f;color:#4dd9a0;border:0.5px solid #4dd9a0;}
    .btn-sm{padding:8px 12px;font-size:0.8rem;min-height:36px;}
    .btn-icon{padding:8px 12px;font-size:1rem;}
    .badge{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;display:inline-block;}
    .badge-green{background:#0a2e1f;color:#4dd9a0;}
    .badge-red{background:#2e0a0a;color:#f07070;}
    .badge-blue{background:#1e3a5f;color:#5daaff;}
    .badge-gray{background:#1a2b3c;color:#7a9ab8;}
    .badge-purple{background:#2d1a4a;color:#c9a5f5;}
    .badge-orange{background:#2e1800;color:#f5a442;}
    .badge-brown{background:#2e1a0a;color:#f5b07a;}
    input,select{width:100%;padding:12px 14px;background:#1a2b3c;border:0.5px solid rgba(255,255,255,0.13);border-radius:10px;color:#e2eaf4;font-size:1rem;outline:none;margin-bottom:12px;min-height:46px;-webkit-appearance:none;}
    input:focus,select:focus{border-color:#185FA5;box-shadow:0 0 0 2px rgba(24,95,165,0.25);}
    label{font-size:0.8rem;color:#7a9ab8;margin-bottom:5px;display:block;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
    .stat-card{background:#1a2b3c;border-radius:12px;padding:14px;text-align:center;}
    .stat-num{font-size:1.8rem;font-weight:700;color:#5daaff;}
    .stat-label{font-size:0.75rem;color:#7a9ab8;margin-top:4px;}
    .card{background:#111c2e;border:0.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;margin-bottom:12px;}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    table{width:100%;border-collapse:collapse;font-size:0.85rem;}
    th{text-align:left;padding:10px 12px;color:#7a9ab8;font-weight:500;font-size:0.72rem;text-transform:uppercase;border-bottom:0.5px solid rgba(255,255,255,0.08);}
    td{padding:10px 12px;border-bottom:0.5px solid rgba(255,255,255,0.05);vertical-align:middle;}
    tr:hover td{background:rgba(255,255,255,0.02);}
    .desktop-only{display:table;}
    .mobile-only{display:none;}
    .lic-card{background:#111c2e;border:0.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
    .lic-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .lic-codigo{font-family:monospace;color:#5daaff;font-size:0.95rem;font-weight:700;}
    .lic-card-fila{display:flex;gap:6px;align-items:center;margin-bottom:6px;font-size:0.85rem;}
    .lic-card-fila .lbl{color:#7a9ab8;min-width:60px;font-size:0.75rem;}
    .lic-card-fila .val{color:#e2eaf4;}
    .lic-card-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
    .lic-card-actions .btn{flex:1;min-width:80px;text-align:center;}
    .link-box{background:#0d1929;border:0.5px solid rgba(93,170,255,0.3);border-radius:8px;padding:10px 12px;font-size:0.78rem;font-family:monospace;color:#5daaff;word-break:break-all;margin:8px 0;display:flex;justify-content:space-between;align-items:center;gap:8px;}
    .btn-copy{background:#185FA5;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:0.75rem;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .negocio-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
    .ns{background:#1a2b3c;border-radius:10px;padding:10px 12px;text-align:center;}
    .ns-val{font-size:1.2rem;font-weight:700;color:#5daaff;}
    .ns-label{font-size:0.7rem;color:#7a9ab8;margin-top:2px;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0;}
    .modal{background:#111c2e;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;border:0.5px solid rgba(255,255,255,0.12);border-bottom:none;max-height:92vh;overflow-y:auto;}
    .modal-drag{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 18px;}
    .login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:40px 20px;}
    .login-box{width:100%;max-width:360px;display:flex;flex-direction:column;gap:0;}
    .venc-ok{color:#4dd9a0;font-weight:700;}
    .venc-warn{color:#f5a442;font-weight:700;}
    .venc-bad{color:#f07070;font-weight:700;}
    #toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#185FA5;color:#fff;padding:12px 22px;border-radius:24px;font-size:0.9rem;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;}
    #btn-escala{position:fixed;bottom:20px;right:16px;z-index:300;background:#1a2b3c;border:1px solid rgba(255,255,255,0.18);border-radius:50px;padding:10px 16px;font-size:0.85rem;font-weight:700;color:#5daaff;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4);touch-action:manipulation;-webkit-tap-highlight-color:transparent;display:none;}
    .search-wrap{position:relative;margin-bottom:14px;}
    .search-wrap input{padding-left:38px;margin-bottom:0;}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#7a9ab8;font-size:1rem;pointer-events:none;}
    /* App cards para pollería y repostería */
    .app-cliente-card{background:#111c2e;border:0.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
    .app-cliente-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .app-cliente-nombre{font-weight:700;font-size:1rem;color:#e2eaf4;}
    .app-cliente-sub{font-size:0.78rem;color:#7a9ab8;margin-top:2px;}
    .app-cliente-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}

    @media (max-width:620px){
      .desktop-only{display:none;}
      .mobile-only{display:block;}
      .header-title span{display:block;}
      .header-title h1{font-size:0.9rem;}
      .grid3,.grid4{gap:8px;}
      .grid4{grid-template-columns:1fr 1fr;}
      .stat-num{font-size:1.5rem;}
      .stat-card{padding:12px 8px;}
      .screen{padding:12px;}
      .ptab{padding:10px 12px;font-size:0.8rem;}
    }
    @media (min-width:621px){
      .modal-overlay{align-items:center;padding:20px;}
      .modal{border-radius:18px;border-bottom:0.5px solid rgba(255,255,255,0.12);}
      .modal-drag{display:none;}
    }
  </style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>
<div id="modal-container"></div>
<button id="btn-escala" onclick="ciclarEscala()">M</button>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
/* ── ESCALA ── */
var ESCALAS={S:12,M:14,L:16,XL:18};
var ORDEN_ESCALA=["S","M","L","XL"];
var escalaActual=localStorage.getItem("adminEscala")||"M";
function aplicarEscala(s){escalaActual=s;document.documentElement.style.fontSize=ESCALAS[s]+"px";var btn=document.getElementById("btn-escala");if(btn)btn.textContent=s;localStorage.setItem("adminEscala",s);}
function ciclarEscala(){var idx=ORDEN_ESCALA.indexOf(escalaActual);aplicarEscala(ORDEN_ESCALA[(idx+1)%ORDEN_ESCALA.length]);}
aplicarEscala(escalaActual);

/* ══════════════════════════════════════════════════════
   FIREBASE — 4 proyectos
══════════════════════════════════════════════════════ */
const ADMIN_UID="A10EnUcd3ngbzmFNwWgSFuWj1OR2";

// 1. Emma (Reparto)
firebase.initializeApp({
  apiKey:"AIzaSyB8BB_xFyXCobGHoMj_dFOTA1n76FROfS4",
  authDomain:"emma-soluciones.firebaseapp.com",
  projectId:"emma-soluciones",
  storageBucket:"emma-soluciones.firebasestorage.app",
  messagingSenderId:"611618583352",
  appId:"1:611618583352:web:90f0f3a0248bc016c087cd"
},"emma");
const dbEmma=firebase.app("emma").firestore();
const auth=firebase.app("emma").auth();

// 2. Kiosco
firebase.initializeApp({
  apiKey:"AIzaSyAI3bPrAZlAvduooCaUZPF1LNeJcriL-WI",
  authDomain:"app-kiosco-c9482.firebaseapp.com",
  projectId:"app-kiosco-c9482",
  storageBucket:"app-kiosco-c9482.firebasestorage.app",
  messagingSenderId:"511057681349",
  appId:"1:511057681349:web:49c18f441f1700416989ac"
},"kiosco");
const dbKiosco=firebase.app("kiosco").firestore();

// 3. Pollería
firebase.initializeApp({
  apiKey:"AIzaSyDl2QhPwVToc4t6UQEGlCydRLzdE4oAx8A",
  authDomain:"app-polleria-f349b.firebaseapp.com",
  projectId:"app-polleria-f349b",
  storageBucket:"app-polleria-f349b.firebasestorage.app",
  messagingSenderId:"831311117717",
  appId:"1:831311117717:web:f1101e7fd49ddcbdb64a9c"
},"polleria");
const dbPolleria=firebase.app("polleria").firestore();

// 4. Repostería
firebase.initializeApp({
  apiKey:"AIzaSyD1CqN9t984CCgZsnxTYiv-DIexEVHj2t4",
  authDomain:"app-reposteria-7e31e.firebaseapp.com",
  projectId:"app-reposteria-7e31e",
  storageBucket:"app-reposteria-7e31e.firebasestorage.app",
  messagingSenderId:"767790519277",
  appId:"1:767790519277:web:76e0e8194e5f10d0998de4"
},"reposteria");
const dbReposteria=firebase.app("reposteria").firestore();

/* ── ESTADO GLOBAL ── */
var productoActivo="reparto";
var licencias=[];
var kioscoClientes=[];
var polleriaUsuarios=[];
var reposteriaUsuarios=[];
var filtroReparto="";
var filtroKiosco="";
var filtroPolleria="";
var filtroReposteria="";

/* ── TOAST ── */
function toast(msg,ok){var t=document.getElementById("toast");t.textContent=msg;t.style.background=(ok===false)?"#c93030":"#185FA5";t.style.opacity="1";setTimeout(function(){t.style.opacity="0";},3000);}

/* ── AUTH ── */
auth.onAuthStateChanged(function(user){
  var btn=document.getElementById("btn-escala");
  if(!user){if(btn)btn.style.display="none";renderLogin("");return;}
  if(user.uid!==ADMIN_UID){auth.signOut();renderLogin("Acceso denegado.");return;}
  if(btn)btn.style.display="flex";
  cargarTodo();
});

function loginGoogle(){
  var email=document.getElementById("adminEmail")?document.getElementById("adminEmail").value:"";
  var pass=document.getElementById("adminPass")?document.getElementById("adminPass").value:"";
  if(!email||!pass){toast("Completá email y contraseña",false);return;}
  auth.signInWithEmailAndPassword(email,pass).catch(function(){toast("Email o contraseña incorrectos",false);});
}
function logout(){auth.signOut();document.getElementById("btn-escala").style.display="none";}

async function cargarTodo(){
  await Promise.all([cargarLicencias(),cargarKioscoClientes(),cargarPolleriaUsuarios(),cargarReposteriaUsuarios()]);
  renderMain();
}

/* ── LOGO ── */
function logoSVG(size){return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" width="'+size+'" height="'+size+'" style="flex-shrink:0"><line x1="12" y1="16" x2="34" y2="38" stroke="#7b3fc9" stroke-width="2" opacity="0.5"/><line x1="76" y1="16" x2="54" y2="38" stroke="#7b3fc9" stroke-width="2" opacity="0.5"/><line x1="12" y1="72" x2="34" y2="50" stroke="#9d65e0" stroke-width="2" opacity="0.5"/><line x1="76" y1="72" x2="54" y2="50" stroke="#9d65e0" stroke-width="2" opacity="0.5"/><circle cx="10" cy="14" r="8" fill="#c9a5f5"/><circle cx="78" cy="14" r="8" fill="#9d65e0"/><circle cx="10" cy="74" r="8" fill="#9d65e0"/><circle cx="78" cy="74" r="8" fill="#c9a5f5"/><circle cx="44" cy="44" r="22" fill="#7b3fc9"/><rect x="33" y="34" width="16" height="3" rx="1.5" fill="white"/><rect x="33" y="42.5" width="12" height="3" rx="1.5" fill="white"/><rect x="33" y="51" width="16" height="3" rx="1.5" fill="white"/></svg>';}

/* ── LOGIN ── */
function renderLogin(err){
  document.getElementById("app").innerHTML=
    '<div class="login-screen">'+
      '<div style="text-align:center">'+logoSVG(72)+
        '<h1 style="font-size:1.4rem;font-weight:700;color:#e2eaf4;margin:12px 0 4px">Panel de Administración</h1>'+
        '<p style="font-size:0.9rem;color:#7a9ab8">Emma Soluciones Digitales</p>'+
      '</div>'+
      (err?'<p style="color:#f07070;font-size:0.85rem;text-align:center">'+err+'</p>':'')+
      '<div class="login-box">'+
        '<label>Email de administrador</label>'+
        '<input id="adminEmail" type="email" placeholder="admin@ejemplo.com" autocomplete="username"/>'+
        '<label>Contraseña</label>'+
        '<input id="adminPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key===\'Enter\')loginGoogle()"/>'+
        '<button class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;border-radius:12px;margin-top:4px" onclick="loginGoogle()">Ingresar</button>'+
        '<p style="font-size:0.75rem;color:#4a6a85;text-align:center;margin-top:12px">Solo el administrador tiene acceso</p>'+
      '</div>'+
    '</div>';
}

/* ══════════════════════════════════════════════════════
   RENDER PRINCIPAL
══════════════════════════════════════════════════════ */
function renderMain(){
  var tabs=[
    {key:"reparto",    icon:"🚚", label:"Reparto",    count:licencias.length},
    {key:"kiosco",     icon:"🏪", label:"Kiosco",     count:kioscoClientes.length},
    {key:"polleria",   icon:"🐔", label:"Pollería",   count:polleriaUsuarios.length},
    {key:"reposteria", icon:"🎂", label:"Repostería", count:reposteriaUsuarios.length},
  ];

  var tabsHtml=tabs.map(function(t){
    var cls="ptab"+(productoActivo===t.key?" activo":"");
    var badge=t.count>0?'<span class="ptab-badge">'+t.count+'</span>':"";
    return '<div class="'+cls+'" onclick="cambiarProducto(\''+t.key+'\')">'+t.icon+' '+t.label+badge+'</div>';
  }).join("");

  var bodyContent="";
  if(productoActivo==="reparto")    bodyContent=renderReparto();
  else if(productoActivo==="kiosco")     bodyContent=renderKiosco();
  else if(productoActivo==="polleria")   bodyContent=renderPolleria();
  else if(productoActivo==="reposteria") bodyContent=renderReposteria();

  document.getElementById("app").innerHTML=
    '<div class="header">'+
      '<div class="header-title">'+logoSVG(36)+
        '<div><h1>Panel Admin</h1><span>Emma Soluciones Digitales</span></div>'+
      '</div>'+
      '<div class="header-actions">'+
        '<button class="btn btn-sm btn-icon" onclick="cargarTodo()" title="Actualizar">↻</button>'+
        '<button class="btn btn-sm" onclick="logout()">Salir</button>'+
      '</div>'+
    '</div>'+
    '<div class="product-tabs">'+tabsHtml+'</div>'+
    '<div class="screen">'+bodyContent+'</div>';
}

function cambiarProducto(p){productoActivo=p;renderMain();}

/* ══════════════════════════════════════════════════════
   REPARTO
══════════════════════════════════════════════════════ */
async function cargarLicencias(){
  try{var snap=await dbEmma.collection("licencias").get();licencias=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});}
  catch(e){console.warn("Licencias error:",e);}
}

function estadoBadgeRep(estado){
  if(estado==="activo")return'<span class="badge badge-blue">Disponible</span>';
  if(estado==="usado")return'<span class="badge badge-green">En uso</span>';
  return'<span class="badge badge-red">Inactiva</span>';
}

function renderReparto(){
  var total=licencias.length;
  var activos=licencias.filter(function(l){return l.estado==="activo"||l.estado==="usado";}).length;
  var inact=licencias.filter(function(l){return l.estado==="inactivo";}).length;
  var filtrados=licencias.filter(function(l){
    if(!filtroReparto)return true;
    return(l.id||"").toLowerCase().indexOf(filtroReparto)>=0||(l.negocio||"").toLowerCase().indexOf(filtroReparto)>=0||(l.email||"").toLowerCase().indexOf(filtroReparto)>=0||(l.celular||"").indexOf(filtroReparto)>=0;
  });

  var filas=filtrados.map(function(l){
    var acc='<button class="btn btn-sm" style="background:#1e3a5f;color:#5daaff;border:none;margin-right:4px" onclick="abrirEditarRep(\''+l.id+'\')">✏️</button>'+
      (l.estado==="inactivo"?'<button class="btn btn-sm btn-success" style="margin-right:4px" onclick="cambiarEstadoRep(\''+l.id+'\',\'activo\')">✅</button>':'<button class="btn btn-sm btn-danger" style="margin-right:4px" onclick="cambiarEstadoRep(\''+l.id+'\',\'inactivo\')">🔴</button>')+
      '<button class="btn btn-sm" style="background:#2e2006;color:#f5b942;border:0.5px solid #f5b942" onclick="resetDispositivo(\''+l.id+'\')">📱</button>';
    return'<tr><td><code style="color:#5daaff;font-size:0.85rem">'+l.id+'</code></td><td style="font-weight:500">'+(l.negocio||'<span style="color:#4a6a85">—</span>')+'</td><td style="color:#7a9ab8;font-size:0.8rem">'+(l.email||"—")+'</td><td style="color:#7a9ab8;font-size:0.8rem">'+(l.celular||"—")+'</td><td>'+estadoBadgeRep(l.estado)+'</td><td><code style="color:#f5b942">'+(l.pin||"—")+'</code></td><td>'+acc+'</td></tr>';
  }).join("");

  var cards=filtrados.map(function(l){
    var accionEstado=l.estado==="inactivo"?'<button class="btn btn-sm btn-success" onclick="cambiarEstadoRep(\''+l.id+'\',\'activo\')">✅ Activar</button>':'<button class="btn btn-sm btn-danger" onclick="cambiarEstadoRep(\''+l.id+'\',\'inactivo\')">🔴 Desactivar</button>';

function toSlug(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
function diasRestantes(f){if(!f)return null;return Math.ceil((new Date(f)-new Date())/(1000*60*60*24));}
function formatFecha(f){if(!f)return"—";return new Date(f).toLocaleDateString("es-AR");}

async function cargarKioscoClientes(){
  try{var snap=await dbKiosco.collection("clientes").get();kioscoClientes=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});}
  catch(e){console.warn("Kiosco clientes error:",e);}
}

function estadoBadgeKio(c){
  if(!c.activo)return'<span class="badge badge-red">Suspendido</span>';
  var d=diasRestantes(c.vencimiento);
  if(d!==null&&d<0)return'<span class="badge badge-orange">Vencido</span>';
  if(d!==null&&d<=7)return'<span class="badge badge-orange">'+d+'d restantes</span>';
  return'<span class="badge badge-green">Activo</span>';
}

function planBadge(plan){
  if(plan==="pro")return'<span class="badge" style="background:#2d1a4a;color:#c9a5f5">PRO</span>';
  if(plan==="basic")return'<span class="badge badge-blue">BASIC</span>';
  return'<span class="badge badge-gray">DEMO</span>';
}

function vencLabel(c){
  if(!c.vencimiento)return'<span style="color:#4a6a85">Sin venc.</span>';
  var d=diasRestantes(c.vencimiento);
  var cls=d<0?"venc-bad":d<=7?"venc-warn":"venc-ok";
  return'<span class="'+cls+'">'+formatFecha(c.vencimiento)+(d!==null?" ("+(d<0?"venció":d+"d")+")":" ")+'</span>';
}

function getKioscoUrl(c){
  var base=window.location.origin+window.location.pathname.replace("index.html","");
  return base+"kiosco.html?id="+(c.negocioId||c.id);
}

function renderKiosco(){
  var total=kioscoClientes.length;
  var activos=kioscoClientes.filter(function(c){return c.activo;}).length;
  var suspendidos=kioscoClientes.filter(function(c){return!c.activo;}).length;
  var porVencer=kioscoClientes.filter(function(c){var d=diasRestantes(c.vencimiento);return d!==null&&d<=7&&d>=0;}).length;

  var filtrados=kioscoClientes.filter(function(c){
    if(!filtroKiosco)return true;
    return(c.nombre||"").toLowerCase().indexOf(filtroKiosco)>=0||(c.email||"").toLowerCase().indexOf(filtroKiosco)>=0||(c.negocioId||c.id||"").toLowerCase().indexOf(filtroKiosco)>=0;
  });

  var cards=filtrados.map(function(c){
    return'<div class="lic-card">'+
      '<div class="lic-card-top"><span class="lic-codigo">'+(c.negocioId||c.id)+'</span>'+estadoBadgeKio(c)+'</div>'+
      '<div class="lic-card-fila"><span class="lbl">Negocio</span><span class="val" style="font-weight:600">'+c.nombre+'</span></div>'+
      '<div class="lic-card-fila"><span class="lbl">Plan</span>'+planBadge(c.plan)+'</div>'+
      '<div class="lic-card-fila"><span class="lbl">Vence</span><span>'+vencLabel(c)+'</span></div>'+
      (c.email?'<div class="lic-card-fila"><span class="lbl">Email</span><span class="val">'+c.email+'</span></div>':'')+
      '<div class="lic-card-actions">'+
        '<button class="btn btn-sm" style="background:#1e3a5f;color:#5daaff;border:none" onclick="abrirEditarKio(\''+c.id+'\')">✏️ Editar</button>'+
        '<button class="btn btn-sm" style="background:#1a2b3c;color:#5daaff;border:none" onclick="copiarLinkKio(\''+c.id+'\')">🔗 Link</button>'+
        '<button class="btn btn-sm" style="background:#1e3a12;color:#6ee836;border:none" onclick="extenderKio(\''+c.id+'\')">📅 Extender</button>'+
        (c.activo?'<button class="btn btn-sm btn-danger" onclick="suspenderKio(\''+c.id+'\',false)">🔴 Suspender</button>':'<button class="btn btn-sm btn-success" onclick="suspenderKio(\''+c.id+'\',true)">✅ Activar</button>')+
      '</div>'+
    '</div>';
  }).join("");

  return'<div class="grid4" style="margin:14px 0">'+
      '<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">Total</div></div>'+
      '<div class="stat-card"><div class="stat-num" style="color:#4dd9a0">'+activos+'</div><div class="stat-label">Activos</div></div>'+
      '<div class="stat-card"><div class="stat-num" style="color:#f07070">'+suspendidos+'</div><div class="stat-label">Suspendidos</div></div>'+
      '<div class="stat-card"><div class="stat-num" style="color:#f5a442">'+porVencer+'</div><div class="stat-label">Por vencer</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">'+
      '<div class="search-wrap" style="flex:1;margin:0"><span class="search-icon">🔍</span><input placeholder="Buscar negocio, email, ID..." oninput="filtroKiosco=this.value.toLowerCase();renderMain()" value="'+filtroKiosco+'"/></div>'+
      '<button class="btn btn-sm btn-purple" onclick="abrirNuevoKio()">+ Nuevo</button>'+
    '</div>'+
    '<div>'+(cards||'<div style="text-align:center;color:#4a6a85;padding:40px 0">Sin clientes todavía.</div>')+'</div>'+
    '<p style="font-size:0.75rem;color:#4a6a85;text-align:center;margin-top:8px;padding-bottom:70px">'+filtrados.length+' de '+total+' clientes</p>';
}

  var c=kioscoClientes.find(function(x){return x.id===id;});

  try{await dbKiosco.collection("clientes").doc(id).update({activo:activo});toast(activo?"✅ Activado":"🔴 Suspendido");cargarTodo();}catch(e){toast(e.message,false);}

async function extenderKio(id){
  var c=kioscoClientes.find(function(x){return x.id===id;});
  var dias=prompt("¿Cuántos días extender a "+(c?c.nombre:id)+"?","30");
  if(!dias)return;
  var base=c&&c.vencimiento&&new Date(c.vencimiento)>new Date()?new Date(c.vencimiento):new Date();
  base.setDate(base.getDate()+parseInt(dias));
  try{await dbKiosco.collection("clientes").doc(id).update({vencimiento:base.toISOString().slice(0,10)});toast("✅ Extendido "+dias+" días");cargarTodo();}catch(e){toast(e.message,false);}

function copiarLinkKio(id){

/* ══════════════════════════════════════════════════════
   REPOSTERÍA — gestión de usuarios
══════════════════════════════════════════════════════ */
async function cargarReposteriaUsuarios(){
  try{
    var snap=await dbReposteria.collection("usuarios_admin").get();
    reposteriaUsuarios=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  }catch(e){
    reposteriaUsuarios=[];
  }
}

function renderReposteria(){
  var total=reposteriaUsuarios.length;
  var activos=reposteriaUsuarios.filter(function(u){return u.activo!==false;}).length;
  var susp=reposteriaUsuarios.filter(function(u){return u.activo===false;}).length;

  var filtrados=reposteriaUsuarios.filter(function(u){
    if(!filtroReposteria)return true;
    return(u.nombre||"").toLowerCase().indexOf(filtroReposteria)>=0||(u.email||"").toLowerCase().indexOf(filtroReposteria)>=0||(u.negocio||"").toLowerCase().indexOf(filtroReposteria)>=0;
  });

  var cards=filtrados.map(function(u){
    return'<div class="app-cliente-card">'+
      '<div class="app-cliente-top">'+
        '<div><div class="app-cliente-nombre">'+(u.negocio||u.nombre||"Sin nombre")+'</div>'+
          '<div class="app-cliente-sub">'+(u.email||"—")+(u.telefono?' · '+u.telefono:'')+'</div>'+
        '</div>'+
        estadoBadgeApp(u.activo)+
      '</div>'+
      (u.notas?'<div style="font-size:0.8rem;color:#7a9ab8;margin-bottom:6px">'+u.notas+'</div>':'')+
      '<div class="app-cliente-actions">'+
        '<button class="btn btn-sm" style="background:#1e3a5f;color:#5daaff;border:none" onclick="editarAppCliente(\'reposteria\',\''+u.id+'\')">✏️ Editar</button>'+
        (u.activo!==false
          ?'<button class="btn btn-sm btn-danger" onclick="toggleAppCliente(\'reposteria\',\''+u.id+'\',false)">🔴 Suspender</button>'
          :'<button class="btn btn-sm btn-success" onclick="toggleAppCliente(\'reposteria\',\''+u.id+'\',true)">✅ Activar</button>'
        )+
        '<button class="btn btn-sm btn-danger" onclick="eliminarAppCliente(\'reposteria\',\''+u.id+'\')">🗑️</button>'+
      '</div>'+
    '</div>';
  }).join("");

  var infoProyecto='<div class="card" style="background:#0a1929;border-color:rgba(93,170,255,0.2);margin-bottom:16px">'+
    '<div style="font-size:0.8rem;color:#f5b07a;font-weight:700;margin-bottom:8px">🎂 App Repostería — Firebase</div>'+
    '<div style="font-size:0.78rem;color:#7a9ab8;margin-bottom:4px">Proyecto: <code style="color:#f5b07a">app-reposteria-7e31e</code></div>'+
    '<div style="font-size:0.78rem;color:#7a9ab8;margin-bottom:8px">GitHub Pages: <code style="color:#f5b07a">emmasolucionesdigitales-lang.github.io/dulce-gestion</code></div>'+
    '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
      '<a href="https://console.firebase.google.com/project/app-reposteria-7e31e/authentication/users" target="_blank" class="btn btn-sm" style="background:#2e1800;color:#f5a442;border:none;text-decoration:none">🔥 Ver usuarios Firebase</a>'+
      '<a href="https://console.firebase.google.com/project/app-reposteria-7e31e/firestore" target="_blank" class="btn btn-sm" style="background:#1e3a5f;color:#5daaff;border:none;text-decoration:none">🗄️ Ver base de datos</a>'+
    '</div>'+
  '</div>';

  return'<div class="grid3" style="margin:14px 0">'+
      '<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">Total</div></div>'+
      '<div class="stat-card"><div class="stat-num" style="color:#4dd9a0">'+activos+'</div><div class="stat-label">Activos</div></div>'+
      '<div class="stat-card"><div class="stat-num" style="color:#f07070">'+susp+'</div><div class="stat-label">Suspendidos</div></div>'+
    '</div>'+
    infoProyecto+
    '<div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">'+
      '<div class="search-wrap" style="flex:1;margin:0"><span class="search-icon">🔍</span><input placeholder="Buscar negocio, email..." oninput="filtroReposteria=this.value.toLowerCase();renderMain()" value="'+filtroReposteria+'"/></div>'+
      '<button class="btn btn-sm btn-orange" onclick="abrirNuevoAppCliente(\'reposteria\',\'🎂\')">+ Nuevo cliente</button>'+
    '</div>'+
    '<div>'+(cards||'<div style="text-align:center;color:#4a6a85;padding:40px 0;line-height:2">Sin clientes todavía.<br>Tocá <b>+ Nuevo cliente</b> para agregar el primero.</div>')+'</div>'+
    '<p style="font-size:0.75rem;color:#4a6a85;text-align:center;margin-top:8px;padding-bottom:70px">'+filtrados.length+' de '+total+' clientes</p>';
}

/* ══════════════════════════════════════════════════════
   HELPERS COMPARTIDOS — Pollería & Repostería
══════════════════════════════════════════════════════ */
function getDb(app){
  if(app==="polleria")return dbPolleria;
  if(app==="reposteria")return dbReposteria;
  return null;
}
function getUsuarios(app){
  if(app==="polleria")return polleriaUsuarios;
  if(app==="reposteria")return reposteriaUsuarios;
  return [];
}

function abrirNuevoAppCliente(app,emoji){
  document.getElementById("modal-container").innerHTML=
    '<div class="modal-overlay" onclick="cerrarModal(event)"><div class="modal"><div class="modal-drag"></div>'+
      '<h2 style="font-size:1.1rem;font-weight:700;margin-bottom:18px">'+emoji+' Nuevo cliente '+app+'</h2>'+
      '<label>Nombre del negocio</label><input id="ac-neg" placeholder="Ej: La Especial"/>'+
      '<label>Nombre del dueño</label><input id="ac-nom" placeholder="Ej: María García"/>'+
      '<label>Email (el que usa para ingresar a la app)</label><input id="ac-ema" type="email" placeholder="dueno@gmail.com"/>'+
      '<label>Teléfono</label><input id="ac-tel" type="tel" placeholder="381 123-4567"/>'+
      '<label>Notas</label><input id="ac-not" placeholder="Ej: cliente de prueba, pago mayo..."/>'+
      '<p style="font-size:0.75rem;color:#7a9ab8;margin:-8px 0 12px">⚠️ Acordate de crear el usuario en Firebase Authentication del proyecto <b>'+app+'</b> con ese email.</p>'+
      '<div style="display:flex;gap:10px;margin-top:6px">'+
        '<button class="btn btn-primary" style="flex:1" onclick="crearAppCliente(\''+app+'\')">Crear</button>'+
        '<button class="btn" onclick="cerrarModalBtn()">Cancelar</button>'+
      '</div></div></div>';
}

async function crearAppCliente(app){
  var neg=(document.getElementById("ac-neg").value||"").trim();
  var nom=(document.getElementById("ac-nom").value||"").trim();
  var ema=(document.getElementById("ac-ema").value||"").trim();
  var tel=(document.getElementById("ac-tel").value||"").trim();
  var not=(document.getElementById("ac-not").value||"").trim();
  if(!neg){toast("El nombre del negocio es obligatorio",false);return;}
  var db=getDb(app);
  try{
    await db.collection("usuarios_admin").add({negocio:neg,nombre:nom,email:ema,telefono:tel,notas:not,activo:true,fechaAlta:new Date().toISOString(),app:app});
    toast("✅ Cliente "+neg+" creado en "+app);cerrarModalBtn();cargarTodo();
  }catch(e){toast(e.message,false);}
}

function editarAppCliente(app,id){
  var u=getUsuarios(app).find(function(x){return x.id===id;});if(!u)return;
  document.getElementById("modal-container").innerHTML=
    '<div class="modal-overlay" onclick="cerrarModal(event)"><div class="modal"><div class="modal-drag"></div>'+
      '<h2 style="font-size:1.1rem;font-weight:700;margin-bottom:18px">✏️ Editar cliente '+app+'</h2>'+
      '<label>Nombre del negocio</label><input id="ec-neg" value="'+(u.negocio||"")+'"/>'+
      '<label>Nombre del dueño</label><input id="ec-nom" value="'+(u.nombre||"")+'"/>'+
      '<label>Email</label><input id="ec-ema" type="email" value="'+(u.email||"")+'"/>'+
      '<label>Teléfono</label><input id="ec-tel" type="tel" value="'+(u.telefono||"")+'"/>'+
      '<label>Notas</label><input id="ec-not" value="'+(u.notas||"")+'"/>'+
      '<label>Estado</label><select id="ec-act"><option value="1"'+(u.activo!==false?" selected":"")+'>✅ Activo</option><option value="0"'+(u.activo===false?" selected":"")+'>🔴 Suspendido</option></select>'+
      '<div style="display:flex;gap:10px;margin-top:6px">'+
        '<button class="btn btn-primary" style="flex:1" onclick="guardarAppCliente(\''+app+'\',\''+id+'\')">Guardar</button>'+
        '<button class="btn" onclick="cerrarModalBtn()">Cancelar</button>'+
      '</div></div></div>';
}

async function guardarAppCliente(app,id){
  var db=getDb(app);
  try{
    await db.collection("usuarios_admin").doc(id).update({
      negocio:document.getElementById("ec-neg").value.trim(),
      nombre:document.getElementById("ec-nom").value.trim(),
      email:document.getElementById("ec-ema").value.trim(),
      telefono:document.getElementById("ec-tel").value.trim(),
      notas:document.getElementById("ec-not").value.trim(),
      activo:document.getElementById("ec-act").value==="1",
    });
    toast("✅ Actualizado");cerrarModalBtn();cargarTodo();
  }catch(e){toast(e.message,false);}
}

async function toggleAppCliente(app,id,activo){
  var u=getUsuarios(app).find(function(x){return x.id===id;});
  if(!confirm((activo?"¿Activar":"¿Suspender")+" a "+(u?u.negocio||u.nombre:id)+"?"))return;
  var db=getDb(app);
  try{await db.collection("usuarios_admin").doc(id).update({activo:activo});toast(activo?"✅ Activado":"🔴 Suspendido");cargarTodo();}catch(e){toast(e.message,false);}
}

async function eliminarAppCliente(app,id){
  var u=getUsuarios(app).find(function(x){return x.id===id;});
  if(!confirm("¿Eliminar permanentemente a "+(u?u.negocio||u.nombre:id)+"?"))return;
  var db=getDb(app);
  try{await db.collection("usuarios_admin").doc(id).delete();toast("✅ Eliminado");cerrarModalBtn();cargarTodo();}catch(e){toast(e.message,false);}
}

/* ── Helpers modales ── */
function cerrarModal(e){if(e.target.classList.contains("modal-overlay"))cerrarModalBtn();}
function cerrarModalBtn(){document.getElementById("modal-container").innerHTML="";}
</script>
